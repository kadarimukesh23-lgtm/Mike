<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mike Max – Fashion for Everyone</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  :root {
    --pink: #ff3f6c;
    --dark: #1a1a2e;
    --white: #ffffff;
    --light: #f5f5f6;
    --gray: #94969f;
    --border: #eaeaec;
    --green: #03a685;
    --gold: #f5a623;
    --font-head: 'Playfair Display', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--font-body); background: var(--light); color: var(--dark); }

  /* ───── PAGE SYSTEM ───── */
  .page { display:none; }
  .page.active { display:block; }

  /* ───── NAVBAR ───── */
  nav {
    position: sticky; top:0; z-index:1000;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .nav-top {
    display:flex; align-items:center; justify-content:space-between;
    max-width:1400px; margin:auto; padding:12px 24px; gap:16px;
  }
  .logo {
    font-family: var(--font-head);
    font-size:28px; font-weight:900;
    color: var(--pink); cursor:pointer; white-space:nowrap;
    letter-spacing:-1px;
  }
  .logo span { color: var(--dark); }
  .search-bar {
    flex:1; display:flex; align-items:center;
    background: var(--light); border-radius:4px;
    border:1px solid var(--border); overflow:hidden;
    max-width:600px;
  }
  .search-bar input {
    flex:1; border:none; background:transparent;
    padding:10px 16px; font-family:var(--font-body); font-size:14px; outline:none;
  }
  .search-bar button {
    background: var(--pink); border:none; color:#fff;
    padding:0 18px; height:42px; cursor:pointer; font-size:16px;
  }
  .nav-icons { display:flex; align-items:center; gap:20px; }
  .nav-icon {
    display:flex; flex-direction:column; align-items:center; cursor:pointer;
    font-size:12px; color: var(--dark); gap:3px; position:relative;
    transition: color .2s;
  }
  .nav-icon:hover { color: var(--pink); }
  .nav-icon i { font-size:20px; }
  .badge {
    position:absolute; top:-6px; right:-8px;
    background: var(--pink); color:#fff;
    border-radius:50%; font-size:10px; width:18px; height:18px;
    display:flex; align-items:center; justify-content:center; font-weight:700;
  }
  .nav-cats {
    display:flex; justify-content:center; gap:0;
    border-top:1px solid var(--border);
  }
  .nav-cat {
    padding:10px 22px; font-size:13px; font-weight:600;
    cursor:pointer; color: var(--dark); text-transform:uppercase;
    letter-spacing:.5px; transition:.2s; border-bottom:3px solid transparent;
  }
  .nav-cat:hover, .nav-cat.active { color:var(--pink); border-bottom-color:var(--pink); }

  /* ───── HERO BANNER ───── */
  .hero {
    width:100%; background: linear-gradient(135deg,#ff3f6c 0%,#a855f7 50%,#1a1a2e 100%);
    min-height:420px; display:flex; align-items:center; overflow:hidden;
    position:relative;
  }
  .hero::before {
    content:''; position:absolute; inset:0;
    background:url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1600&q=80') center/cover;
    opacity:.18;
  }
  .hero-content { position:relative; z-index:2; max-width:1400px; margin:auto; padding:40px 40px; }
  .hero-tag { background: var(--gold); color:#fff; font-size:12px; font-weight:700;
    padding:4px 12px; border-radius:2px; display:inline-block; margin-bottom:16px; letter-spacing:1px; }
  .hero h1 { font-family:var(--font-head); font-size:clamp(36px,6vw,72px);
    color:#fff; line-height:1.05; margin-bottom:16px; }
  .hero p { color:rgba(255,255,255,.8); font-size:18px; margin-bottom:28px; }
  .hero-btns { display:flex; gap:12px; flex-wrap:wrap; }
  .btn-hero {
    padding:13px 32px; border-radius:3px; font-size:14px; font-weight:700;
    cursor:pointer; border:none; letter-spacing:.5px; transition:.2s;
  }
  .btn-hero.primary { background:var(--white); color:var(--pink); }
  .btn-hero.primary:hover { background:var(--pink); color:#fff; }
  .btn-hero.outline { background:transparent; color:#fff; border:2px solid #fff; }
  .btn-hero.outline:hover { background:#fff; color:var(--dark); }

  /* ───── CATEGORY PILLS ───── */
  .cat-strip { background:#fff; padding:20px 0; overflow-x:auto; }
  .cat-strip-inner { display:flex; gap:16px; padding:0 24px; width:max-content; }
  .cat-pill {
    display:flex; flex-direction:column; align-items:center; gap:10px;
    cursor:pointer; min-width:80px;
  }
  .cat-pill-img {
    width:72px; height:72px; border-radius:50%; overflow:hidden;
    border:3px solid var(--border); transition:.2s;
  }
  .cat-pill:hover .cat-pill-img { border-color:var(--pink); }
  .cat-pill-img img { width:100%; height:100%; object-fit:cover; }
  .cat-pill span { font-size:12px; font-weight:600; color:var(--dark); text-align:center; }

  /* ───── SECTION TITLES ───── */
  .section { max-width:1400px; margin:0 auto; padding:32px 24px; }
  .section-head {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px;
  }
  .section-head h2 { font-family:var(--font-head); font-size:26px; }
  .see-all {
    color:var(--pink); font-size:13px; font-weight:700;
    cursor:pointer; border:1px solid var(--pink); padding:6px 16px;
    border-radius:20px; transition:.2s;
  }
  .see-all:hover { background:var(--pink); color:#fff; }

  /* ───── PRODUCT GRID ───── */
  .product-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(210px,1fr));
    gap:20px;
  }
  .product-card {
    background:#fff; border-radius:8px; overflow:hidden;
    cursor:pointer; transition:.25s; position:relative;
    box-shadow:0 1px 4px rgba(0,0,0,.07);
  }
  .product-card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,.12); }
  .product-img { width:100%; aspect-ratio:3/4; overflow:hidden; position:relative; }
  .product-img img { width:100%; height:100%; object-fit:cover; transition:.4s; }
  .product-card:hover .product-img img { transform:scale(1.06); }
  .wishlist-btn {
    position:absolute; top:10px; right:10px; background:#fff;
    border:none; border-radius:50%; width:34px; height:34px;
    font-size:16px; cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.15);
    display:flex; align-items:center; justify-content:center;
    color:var(--gray); transition:.2s; z-index:3;
  }
  .wishlist-btn.active, .wishlist-btn:hover { color:var(--pink); }
  .discount-badge {
    position:absolute; bottom:10px; left:10px;
    background:var(--pink); color:#fff; font-size:11px;
    font-weight:700; padding:3px 8px; border-radius:2px;
  }
  .product-info { padding:12px; }
  .brand { font-weight:700; font-size:14px; color:var(--dark); margin-bottom:2px; }
  .product-name { font-size:13px; color:var(--gray); margin-bottom:8px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .price-row { display:flex; align-items:center; gap:8px; }
  .price { font-size:15px; font-weight:700; }
  .original-price { font-size:13px; color:var(--gray); text-decoration:line-through; }
  .discount-pct { font-size:13px; color:var(--green); font-weight:600; }
  .rating-row { display:flex; align-items:center; gap:4px; margin-top:6px; }
  .rating-pill {
    background:#14958f; color:#fff; font-size:11px; font-weight:700;
    padding:2px 7px; border-radius:2px; display:flex; align-items:center; gap:3px;
  }
  .rating-count { font-size:12px; color:var(--gray); }
  .add-cart-btn {
    width:100%; margin-top:10px; padding:8px;
    background:var(--pink); border:none; color:#fff;
    font-family:var(--font-body); font-size:13px; font-weight:700;
    border-radius:4px; cursor:pointer; transition:.2s; letter-spacing:.3px;
  }
  .add-cart-btn:hover { background:#d92d56; }

  /* ───── FILTER BAR ───── */
  .filter-bar {
    background:#fff; border-bottom:1px solid var(--border);
    padding:12px 24px; display:flex; gap:12px; overflow-x:auto;
  }
  .filter-chip {
    padding:7px 16px; border:1px solid var(--border);
    border-radius:20px; font-size:13px; cursor:pointer;
    white-space:nowrap; transition:.2s; font-weight:500;
  }
  .filter-chip:hover, .filter-chip.active {
    border-color:var(--pink); color:var(--pink); background:#fff5f7;
  }

  /* ───── PRODUCT LISTING PAGE ───── */
  .listing-layout { display:flex; max-width:1400px; margin:0 auto; }
  .sidebar {
    width:240px; min-width:240px; background:#fff;
    padding:20px; border-right:1px solid var(--border);
    min-height:80vh;
  }
  .sidebar h3 { font-size:15px; font-weight:700; margin-bottom:14px; }
  .filter-section { margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:16px; }
  .filter-section h4 { font-size:13px; font-weight:700; color:var(--dark); margin-bottom:10px; }
  .filter-option { display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer; }
  .filter-option input { accent-color:var(--pink); }
  .filter-option label { font-size:13px; cursor:pointer; }
  .listing-products { flex:1; padding:20px 24px; }
  .listing-top {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px;
  }
  .listing-top span { font-size:14px; color:var(--gray); }
  .sort-select {
    border:1px solid var(--border); padding:7px 12px;
    border-radius:4px; font-family:var(--font-body); font-size:13px;
    cursor:pointer; outline:none;
  }

  /* ───── PRODUCT DETAIL ───── */
  .detail-page { max-width:1400px; margin:0 auto; padding:24px; }
  .detail-layout { display:flex; gap:40px; flex-wrap:wrap; }
  .detail-imgs { flex:1; min-width:300px; }
  .main-img { width:100%; border-radius:8px; aspect-ratio:3/4; object-fit:cover; }
  .thumb-row { display:flex; gap:8px; margin-top:12px; }
  .thumb {
    width:64px; height:80px; border-radius:4px; object-fit:cover;
    cursor:pointer; border:2px solid transparent; transition:.2s;
  }
  .thumb.active, .thumb:hover { border-color:var(--pink); }
  .detail-info { flex:1; min-width:280px; }
  .detail-brand { font-size:22px; font-weight:700; }
  .detail-name { font-size:16px; color:var(--gray); margin:4px 0 16px; }
  .detail-price { font-size:28px; font-weight:700; }
  .detail-orig { font-size:16px; color:var(--gray); text-decoration:line-through; margin-left:10px; }
  .detail-disc { font-size:16px; color:var(--green); font-weight:600; margin-left:6px; }
  .size-label { font-size:14px; font-weight:700; margin:18px 0 10px; }
  .size-grid { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
  .size-btn {
    border:1px solid var(--border); border-radius:4px;
    padding:8px 14px; font-size:14px; cursor:pointer;
    font-family:var(--font-body); transition:.2s; background:#fff;
  }
  .size-btn:hover, .size-btn.active {
    border-color:var(--pink); color:var(--pink); background:#fff5f7;
  }
  .detail-actions { display:flex; gap:12px; margin-bottom:24px; }
  .btn-cart {
    flex:1; padding:14px; background:var(--white);
    border:2px solid var(--pink); color:var(--pink);
    font-family:var(--font-body); font-size:15px; font-weight:700;
    border-radius:4px; cursor:pointer; transition:.2s; letter-spacing:.3px;
  }
  .btn-cart:hover { background:#fff5f7; }
  .btn-buy {
    flex:1; padding:14px; background:var(--pink); border:none;
    color:#fff; font-family:var(--font-body); font-size:15px; font-weight:700;
    border-radius:4px; cursor:pointer; transition:.2s;
  }
  .btn-buy:hover { background:#d92d56; }
  .delivery-info { background:var(--light); border-radius:6px; padding:14px; font-size:13px; }
  .delivery-info p { margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .delivery-info i { color:var(--green); }

  /* ───── CART ───── */
  .cart-page { max-width:1100px; margin:0 auto; padding:24px; }
  .cart-layout { display:flex; gap:24px; flex-wrap:wrap; }
  .cart-items { flex:1; min-width:300px; }
  .cart-summary { width:300px; min-width:260px; }
  .cart-item {
    background:#fff; border-radius:8px; padding:16px;
    display:flex; gap:16px; margin-bottom:16px;
    box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .cart-item-img { width:100px; height:130px; border-radius:6px; object-fit:cover; }
  .cart-item-info { flex:1; }
  .cart-brand { font-weight:700; font-size:15px; }
  .cart-desc { color:var(--gray); font-size:13px; margin:4px 0; }
  .cart-size { font-size:13px; margin-bottom:10px; }
  .cart-size span { font-weight:600; }
  .qty-row { display:flex; align-items:center; gap:12px; }
  .qty-btn {
    width:28px; height:28px; border:1px solid var(--border);
    border-radius:50%; background:#fff; cursor:pointer;
    font-size:16px; display:flex; align-items:center; justify-content:center;
    transition:.2s;
  }
  .qty-btn:hover { border-color:var(--pink); color:var(--pink); }
  .qty-val { font-weight:700; font-size:15px; }
  .remove-btn {
    background:none; border:none; color:var(--pink);
    cursor:pointer; font-size:13px; font-weight:600; margin-top:8px;
    padding:0; font-family:var(--font-body);
  }
  .summary-box {
    background:#fff; border-radius:8px; padding:20px;
    box-shadow:0 1px 4px rgba(0,0,0,.06); position:sticky; top:80px;
  }
  .summary-box h3 {
    font-size:14px; font-weight:700; color:var(--gray);
    border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:16px;
    letter-spacing:.5px; text-transform:uppercase;
  }
  .summary-row {
    display:flex; justify-content:space-between;
    font-size:14px; margin-bottom:12px;
  }
  .summary-row.total {
    font-size:16px; font-weight:700; border-top:1px solid var(--border);
    padding-top:12px; margin-top:12px;
  }
  .summary-discount { color:var(--green); }
  .coupon-row { display:flex; gap:8px; margin:16px 0; }
  .coupon-input {
    flex:1; border:1px solid var(--border); border-radius:4px;
    padding:9px 12px; font-family:var(--font-body); font-size:13px; outline:none;
  }
  .coupon-input:focus { border-color:var(--pink); }
  .apply-btn {
    background:none; border:1px solid var(--pink); color:var(--pink);
    padding:9px 14px; border-radius:4px; cursor:pointer;
    font-family:var(--font-body); font-weight:700; font-size:13px;
  }
  .checkout-btn {
    width:100%; padding:14px; background:var(--pink); border:none;
    color:#fff; font-family:var(--font-body); font-size:16px; font-weight:700;
    border-radius:4px; cursor:pointer; margin-top:16px; transition:.2s;
  }
  .checkout-btn:hover { background:#d92d56; }

  /* ───── CHECKOUT ───── */
  .checkout-page { max-width:1100px; margin:0 auto; padding:24px; }
  .checkout-layout { display:flex; gap:24px; flex-wrap:wrap; }
  .checkout-form-area { flex:1; min-width:300px; }
  .checkout-summary { width:300px; min-width:260px; }
  .step-header {
    background:#fff; border-radius:8px; padding:16px 20px;
    display:flex; align-items:center; gap:12px;
    margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .step-num {
    width:28px; height:28px; background:var(--pink);
    border-radius:50%; color:#fff; font-weight:700; font-size:13px;
    display:flex; align-items:center; justify-content:center;
  }
  .step-header h3 { font-size:15px; font-weight:700; }
  .form-section {
    background:#fff; border-radius:8px; padding:20px;
    margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .form-row { display:flex; gap:16px; margin-bottom:16px; }
  .form-group { flex:1; display:flex; flex-direction:column; gap:6px; }
  .form-group label { font-size:13px; font-weight:600; color:var(--dark); }
  .form-control {
    border:1px solid var(--border); border-radius:4px;
    padding:10px 14px; font-family:var(--font-body);
    font-size:14px; outline:none; transition:.2s;
  }
  .form-control:focus { border-color:var(--pink); }
  .payment-option {
    border:2px solid var(--border); border-radius:8px;
    padding:14px 16px; margin-bottom:12px; cursor:pointer;
    display:flex; align-items:center; gap:14px; transition:.2s;
  }
  .payment-option:hover, .payment-option.active {
    border-color:var(--pink); background:#fff5f7;
  }
  .payment-option i { font-size:22px; color:var(--pink); width:28px; text-align:center; }
  .payment-option-text h4 { font-size:14px; font-weight:700; }
  .payment-option-text p { font-size:12px; color:var(--gray); margin-top:2px; }
  .upi-input-row { display:flex; gap:10px; margin-top:12px; }
  .upi-input {
    flex:1; border:1px solid var(--border); border-radius:4px;
    padding:10px 14px; font-family:var(--font-body); font-size:14px; outline:none;
  }
  .verify-btn {
    background:var(--pink); border:none; color:#fff;
    padding:10px 16px; border-radius:4px; cursor:pointer;
    font-family:var(--font-body); font-weight:700; font-size:13px;
  }
  .card-form { margin-top:12px; }
  .place-order-btn {
    width:100%; padding:15px; background:var(--pink); border:none;
    color:#fff; font-family:var(--font-body); font-size:16px; font-weight:700;
    border-radius:4px; cursor:pointer; margin-top:16px; transition:.2s;
    letter-spacing:.3px;
  }
  .place-order-btn:hover { background:#d92d56; }

  /* ───── ORDER SUCCESS ───── */
  .success-page {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-height:70vh; text-align:center; padding:40px;
  }
  .success-icon {
    width:100px; height:100px; background:#e7faf6;
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    margin-bottom:24px;
  }
  .success-icon i { font-size:52px; color:var(--green); }
  .success-page h2 { font-family:var(--font-head); font-size:32px; margin-bottom:12px; }
  .success-page p { color:var(--gray); font-size:16px; margin-bottom:24px; }
  .order-id { background:var(--light); border-radius:6px; padding:12px 24px;
    font-weight:700; font-size:15px; margin-bottom:28px; }
  .continue-btn {
    background:var(--pink); border:none; color:#fff;
    padding:14px 40px; border-radius:4px; cursor:pointer;
    font-family:var(--font-body); font-size:16px; font-weight:700;
    transition:.2s;
  }
  .continue-btn:hover { background:#d92d56; }

  /* ───── FOOTER ───── */
  footer {
    background:var(--dark); color:#ccc; padding:40px 24px 20px;
    margin-top:40px;
  }
  .footer-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:32px; max-width:1400px; margin:0 auto 32px;
  }
  .footer-col h4 {
    color:#fff; font-size:14px; font-weight:700; margin-bottom:16px;
    text-transform:uppercase; letter-spacing:.5px;
  }
  .footer-col ul { list-style:none; }
  .footer-col ul li { margin-bottom:8px; font-size:13px; cursor:pointer; }
  .footer-col ul li:hover { color:#fff; }
  .footer-logo { font-family:var(--font-head); font-size:28px; color:var(--pink); font-weight:900; }
  .footer-logo span { color:#fff; }
  .footer-desc { font-size:13px; line-height:1.7; margin:12px 0 16px; }
  .social-icons { display:flex; gap:12px; }
  .social-icons a {
    width:36px; height:36px; border:1px solid #444; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:#ccc; font-size:15px; cursor:pointer; transition:.2s; text-decoration:none;
  }
  .social-icons a:hover { background:var(--pink); border-color:var(--pink); color:#fff; }
  .footer-bottom {
    border-top:1px solid #333; padding-top:20px;
    max-width:1400px; margin:0 auto;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;
    gap:12px; font-size:12px; color:#888;
  }
  .pay-icons { display:flex; gap:8px; align-items:center; }
  .pay-icons span {
    background:#fff; color:var(--dark); padding:4px 10px;
    border-radius:4px; font-size:11px; font-weight:700;
  }

  /* ───── TOAST ───── */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--dark); color:#fff; padding:12px 24px;
    border
